<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <style>
        *{
            margin:0;
            padding:0;
        }

        body{
            background:#e6e6e6;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

        }

        .card{
            width:350px;
            background:white;
            border-radius:20px;
            text-align:center;
            
        }
        .top{
            height:150px;
            background:#4d73f8;
            position:relative;
            border-top-left-radius:20px;
            border-top-right-radius:20px;
        }


        .profile-img{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #4d73f8;
            position:absolute;
            bottom:-60px;
            left:50%;
            transform:translateX(-50%);
        }
        .text{
            padding-top:80px;
            padding-bottom:30px;
        }

        .text h2{
            font-size:35px;
            color:#333;
        }
        .scicons{
            display:flex;
            justify-content:center;
            justify-content:space-evenly;
            margin: 25px;
        }

        .icon{
            width:50px;
            height:50px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .facebook{
            background:#1877f2;
        }

        .twit{
            background:white;
        }

        .insta{
            background:#e1306c;
        }

        .youtube{
            background:red;
        }

        .icon img{
            width:25px;
            height:25px;
        }
        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-bottom:30px;
        }

        button{
            border:none;
            background:#4d73f8;
            color:white;
            padding:12px 35px;
            border-radius:25px;
            font-size:18px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top">
            <img class="profile-img" src="download.jpeg"alt="profile">
        </div>

        <div class="text">

            <h2>CodingLab</h2>
            <p>YouTuber & Blogger</p>


            <div class="scicons">

                <div class="icon facebook">
                    <img src="f.png">
                </div>

                <div class="icon twit">
                    <img src="tw.png">
                </div>

                <div class="icon insta">
                    <img src="i.png">
                </div>

                <div class="icon youtube">
                    <img src="y.png">
                </div>

            </div>


            <div class="buttons">
                <button>Subscribe</button>
                <button>Message</button>
            </div>
        </div>

    </div>

</body>
</html>
