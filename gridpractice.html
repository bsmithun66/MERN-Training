<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            height: 500px;
            width: 500px;
            background-color: rgba(29, 1, 58, 0.849);
            display: grid;
            grid-template-columns: repeat(3, 1  fr);
            grid-template-rows: repeat(3, 150px);
            gap: 10px;
            margin-left: 350px;
            border-radius: 10px;
        }
        .box1 {
            margin-top: 8px;
            margin-left: 8px;
            background-color: rgba(80, 4, 162, 0.849);
            border-radius: 10px;
        }
        .box2 {
            font-size: 30px;            
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background-color: rgba(80, 4, 162, 0.849);
            border-radius: 10px;
            margin-top: 8px;
            
        }
        .box3 {
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(80, 4, 162, 0.849);
            border-radius: 10px;
            margin-top: 8px;
            margin-right: 8px;
        }
        .box4 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: white;
            background-color: rgba(80, 4, 162, 0.849);
            border-radius: 10px;
            margin-left: 8px;
        }
        .box5 {
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(79, 79, 249);
            border-radius: 10px;
        }
        .box6 {
            color: black;
            font-size: 30px;
            background-color: white;
            border-radius: 10px;
            grid-row: 2 / 4;
            grid-column: 3 / 4;
            margin-right: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
        }
        .box7 {
            background-color:rgba(80, 4, 162, 0.849);
            border-radius: 10px;
            grid-column: 1 / 3;
            margin-left: 8px;
            font-size: 15px;
            color: white;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box1">
            
        </div>
        <div class="box2">
            <h2>25K</h2>
            
        </div>
        <div class="box3">50K</div>
        <div class="box4">1,538</div>
        <div class="box5">DESIGN</div>
        <div class="box6"> 200k</div>
        <div class="box7">
            <p>A place to learn UI Design & web Design.</p>
        </div>
    </div>
</body>
</html>
